name: Claude Code Review

on:
  # Manual trigger only — no auto-runs on every PR.
  # To review a PR: go to Actions > Claude Code Review > Run workflow,
  # or comment "@claude review this PR" on the PR (handled by claude.yml).
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: code-review@claude-code-plugins
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ inputs.pr_number }}'
